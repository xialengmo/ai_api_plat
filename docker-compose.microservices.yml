services:
  db:
    image: mysql:8.0
    container_name: ai-plat-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-api_test_platform}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - ai-plat-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-plat-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-replace-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost}
      DB_NAME: ${DB_NAME:-api_test_platform}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_HOST: db
      DB_PORT: 3306
      DB_MYSQL57_COMPAT: ${DB_MYSQL57_COMPAT:-False}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123456}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-259200}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-60}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-900}
      DJANGO_COLLECTSTATIC: 1
    volumes:
      - backend_storage:/app/storage
      - backend_static:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - ai-plat-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: ai-plat-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - ai-plat-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-plat-gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/gateway.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/var/www/backend-static:ro
    networks:
      - ai-plat-net

volumes:
  mysql_data:
  backend_storage:
  backend_static:

networks:
  ai-plat-net:
    driver: bridge
